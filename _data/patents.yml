- title: "Systems and Methods for Generating Aggregated Reviews"
  publication_number: "US20260017697A1"
  application_number: "19/231,808"
  patent_office: "US"
  status: pending
  date_filed: "2024"
  date_published: "2026-01-15"
  date_granted: ""
  inventors:
    - Hari Prasad Piridi
    - Rahul Ghosh
    - Himanshu Tanwar
    - Anuranjan Kumar
    - Sunil Rudresh
    - Dhruv Sharma
    - Girish Thiruvenkadam
  abstract: "Systems and methods for generating aggregate reviews are disclosed. Generating aggregate reviews includes receiving review data associated with an item object in a database and selecting a subset of the review data based on a first selection criteria. The systems and methods further include generating a target keyword score for each respective target keyword based on a polarity of the target keywords, selecting a subset of the target keywords based on a predetermined range of the target keyword scores, generating one or more target keyword summaries for each respective target keyword, generating an item object summary based on the one or more target keyword summaries, iteratively modifying the item object summary using a self-critique module, and generating a set of instructions to cause the item object summary to be displayed on a user interface."
  link: "https://patents.google.com/patent/US20260017697A1/en"

- title: "Systems and Methods for Automated Interface Element Generation and Presentation — Badge Selection Framework"
