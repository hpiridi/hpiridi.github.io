    - Sreejith Kallummil
    - Sunil Rudresh
    - Anuranjan Kumar
    - Nayan Gupta
    - Anwesha Bhowmik
    - Pritam Prakash
    - Nikul Atmaram Prajapati
    - Girish Thiruvenkadam
    - Suman Kumar
    - Hari Prasad Piridi
    - Rahul Ghosh
    - Kannan Achan
    - Anurag Katiyar
  abstract: "System and methods for generating user interface elements are disclosed. Generating user interface elements includes receiving a request for interface elements associated with at least one of one or more candidate items, generating a user affinity score for the candidate interface elements and generating a candidate item affinity score for the candidate items and the candidate interface elements. In response to the request for interface elements, generating a combined affinity score for each candidate item, generating a plurality of interface elements for the candidate items, ranking the plurality of interface elements based on the combined affinity score for the interface elements and the candidate items, selecting a subset of the plurality of interface elements for the candidate items, and generating a set of instructions to cause the subset of the interface elements to be displayed in conjunction with the corresponding candidate items."
  link: "https://patents.google.com/patent/US20260017072A1/en"

