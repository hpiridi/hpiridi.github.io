  abstract: "System and methods for generating user interface elements are disclosed. Generating user interface elements includes receiving a request for a user interface including one or more candidate items, selecting a set of interface elements for display in conjunction with at least one of the one or more candidate items, obtaining a quantity of available interface element locations based on a quantity of the one or more candidate items, selecting a subset of interface elements from the set of interface elements based on a first selection criteria, and generating a set of instructions to cause a device to generate a user interface including the subset of interface elements displayed in conjunction with a corresponding one of the one or more candidate items."
